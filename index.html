<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>지유진 로또 당첨 기원</title>
  <link href='/style.css' rel='stylesheet'>
</head>
<body>
  <div class="container">
    <button id="theme-toggle" class="theme-toggle-btn">다크 모드 🌙</button>
    <h1>지유진 로또 당첨 기원</h1>
    <div id="lotto-numbers" class="numbers-container">
      <!-- 번호가 여기에 표시됩니다 -->
      <div class="placeholder">버튼을 눌러 번호를 추첨해보세요!</div>
    </div>
    <div class="options">
      <div>
        <input type="checkbox" id="bonus-checkbox">
        <label for="bonus-checkbox">보너스 번호 추첨하기</label>
      </div>
      <div>
        <input type="checkbox" id="five-games-checkbox">
        <label for="five-games-checkbox">5게임 한 번에 뽑기</label>
      </div>
    </div>
    <button id="generate-btn">번호 추첨하기</button>
  </div>
  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
